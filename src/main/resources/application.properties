spring.config.import=classpath:application.yaml

spring.application.name=SpringJPA

server.port=11000

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=${secure.datasource.url}
spring.datasource.username=${secure.datasource.username}
spring.datasource.password=${secure.datasource.password}

#MongoDB Connection
spring.data.mongodb.host=${secure.datasource.mongodb.host}
spring.data.mongodb.port=${secure.datasource.mongodb.port}
spring.data.mongodb.database=${secure.datasource.mongodb.database}
spring.data.mongodb.username=${secure.datasource.mongodb.username}
spring.data.mongodb.password=${secure.datasource.mongodb.password}

#RedisDB Connection
spring.data.redis.host=${secure.datasource.redis.host}
spring.data.redis.port=${secure.datasource.redis.port}
spring.data.redis.username=${secure.datasource.redis.username}
spring.data.redis.password=${secure.datasource.redis.password}

spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.jakarta.persistence.sharedCache.mode=ENABLE_SELECTIVE
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties..hibernate.cache.use_query_cache=true
spring.jpa.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.internal.JCacheRegionFactory
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.properties.hibernate.default_batch_fetch_size=100

spring.jpa.open-in-view=false

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.use_sql_comments=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.thymeleaf.cache=true
spring.thymeleaf.check-template-location=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html